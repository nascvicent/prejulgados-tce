services:
  - type: web
    name: prejulgados-tce
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/analise.db
    disk:
      name: db
      mountPath: /data
      sizeGB: 1
